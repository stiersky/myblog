<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老板的博客</title>
    <style>
        :root {
            --primary: #2563eb;
            --text: #1f2937;
            --text-light: #6b7280;
            --bg: #ffffff;
            --bg-alt: #f9fafb;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: var(--text);
            background: var(--bg);
        }
        .container { max-width: 800px; margin: 0 auto; padding: 0 20px; }
        
        /* Header */
        header {
            padding: 60px 0 40px;
            border-bottom: 1px solid #e5e7eb;
        }
        .site-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 10px;
        }
        .site-desc {
            color: var(--text-light);
            font-size: 1.1rem;
        }
        .nav {
            margin-top: 20px;
        }
        .nav a {
            color: var(--primary);
            text-decoration: none;
            margin-right: 20px;
            font-weight: 500;
        }
        .nav a:hover { text-decoration: underline; }
        
        /* Articles */
        main { padding: 40px 0; }
        .article-list { list-style: none; }
        .article-item {
            padding: 25px 0;
            border-bottom: 1px solid #e5e7eb;
        }
        .article-item:last-child { border-bottom: none; }
        .article-date {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        .article-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .article-title a {
            color: var(--text);
            text-decoration: none;
        }
        .article-title a:hover { color: var(--primary); }
        .article-excerpt {
            color: var(--text-light);
            line-height: 1.7;
        }
        
        /* Footer */
        footer {
            padding: 40px 0;
            border-top: 1px solid #e5e7eb;
            color: var(--text-light);
            font-size: 0.9rem;
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .site-title { font-size: 2rem; }
            header { padding: 40px 0 30px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1 class="site-title">📊 老板的博客</h1>
            <p class="site-desc">业务思考 · 市场分析 · 产品规划</p>
            <nav class="nav">
                <a href="index.html">首页</a>
                <a href="about.html">关于</a>
                <a href="articles/">文章</a>
            </nav>
        </div>
    </header>
    
    <main class="container">
        <ul class="article-list">
            <li class="article-item">
                <div class="article-date">2026 年 3 月 3 日</div>
                <h2 class="article-title">
                    <a href="articles/hello-world.html">你好，世界！</a>
                </h2>
                <p class="article-excerpt">
                    这是我的第一篇博客文章。从今天开始，我会在这里分享业务思考、市场分析和产品规划的心得...
                </p>
            </li>
        </ul>
    </main>
    
    <footer>
        <div class="container">
            <p>© 2026 老板的博客 · Powered by 🦞</p>
        </div>
    </footer>
</body>
</html>

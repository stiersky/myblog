<!DOCTYPE html>

        :root {

            --text: #1f2937;
            --text-light: #6b7280;
            --bg: #ffffff;

        * { margin: 0; padding: 0; box-sizing: border-box; }

            color: var(--primary);
            text-decoration: none;
            margin-right: 20px;
            font-weight: 500;
        }
        .nav a:hover { text-decoration: underline; }
        
        main { padding: 40px 0; }
        .content { line-height: 1.8; }
        .content h2 { margin: 30px 0 15px; font-size: 1.5rem; }
        .content p { margin-bottom: 20px; }
        
        footer {
            padding: 40px 0;

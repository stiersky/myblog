<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="popGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="popGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="popShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <circle cx="200" cy="200" r="180" fill="url(#popGrad1)"/>
  
  <!-- Decorative Circles -->
  <circle cx="80" cy="100" r="20" fill="#ffffff" opacity="0.3"/>
  <circle cx="320" cy="120" r="15" fill="#ffffff" opacity="0.3"/>
  <circle cx="100" cy="300" r="25" fill="#ffffff" opacity="0.2"/>
  <circle cx="300" cy="280" r="18" fill="#ffffff" opacity="0.25"/>
  
  <!-- Pop Art Person -->
  <g transform="translate(200, 220)" filter="url(#popShadow)">
    <!-- Body -->
    <ellipse cx="0" cy="75" rx="68" ry="72" fill="url(#popGrad2)"/>
    
    <!-- Head -->
    <circle cx="0" cy="-20" r="60" fill="url(#popGrad2)"/>
    
    <!-- Hair -->
    <path d="M-55 -30 Q-60 -55 -40 -65 Q-15 -72 0 -68 Q15 -72 40 -65 Q60 -55 55 -30 Q50 -45 30 -52 Q0 -58 -30 -52 Q-50 -45 -55 -30" fill="#1f2937"/>
    
    <!-- Big Eyes -->
    <ellipse cx="-24" cy="-16" rx="20" ry="24" fill="#ffffff"/>
    <ellipse cx="24" cy="-16" rx="20" ry="24" fill="#ffffff"/>
    <circle cx="-20" cy="-20" r="14" fill="#1f2937"/>
    <circle cx="28" cy="-20" r="14" fill="#1f2937"/>
    <circle cx="-16" cy="-25" r="7" fill="#ffffff"/>
    <circle cx="32" cy="-25" r="7" fill="#ffffff"/>
    
    <!-- Glasses -->
    <g stroke="#1f2937" stroke-width="3.5" fill="none">
      <circle cx="-24" cy="-16" r="22"/>
      <circle cx="24" cy="-16" r="22"/>
      <line x1="-2" y1="-16" x2="2" y2="-16"/>
    </g>
    
    <!-- Blush -->
    <ellipse cx="-42" cy="8" rx="16" ry="11" fill="#f43f5e" opacity="0.5"/>
    <ellipse cx="42" cy="8" rx="16" ry="11" fill="#f43f5e" opacity="0.5"/>
    
    <!-- Big Smile -->
    <path d="M-25 22 Q0 42 25 22" stroke="#1f2937" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Hands -->
    <circle cx="-58" cy="72" r="22" fill="url(#popGrad2)"/>
    <circle cx="58" cy="72" r="22" fill="url(#popGrad2)"/>
  </g>
  
  <!-- Laptop -->
  <g transform="translate(200, 308)" filter="url(#popShadow)">
    <rect x="-50" y="-30" width="100" height="55" rx="5" fill="#1f2937"/>
    <rect x="-44" y="-24" width="88" height="45" rx="3" fill="#374151"/>
    <rect x="-38" y="-17" width="55" height="5" rx="2" fill="#a78bfa"/>
    <rect x="-38" y="-7" width="65" height="5" rx="2" fill="#a78bfa"/>
    <rect x="-38" y="3" width="50" height="5" rx="2" fill="#a78bfa"/>
    <rect x="-38" y="13" width="60" height="5" rx="2" fill="#a78bfa"/>
    <path d="M-55 25 L55 25 L62 33 L-62 33 Z" fill="#374151"/>
  </g>
  
  <!-- Pop Lobster Hat -->
  <g transform="translate(200, 130)" filter="url(#popShadow)">
    <!-- Hat Base -->
    <ellipse cx="0" cy="45" rx="75" ry="18" fill="#f59e0b"/>
    
    <!-- Lobster Body -->
    <ellipse cx="0" cy="0" rx="65" ry="45" fill="#f59e0b"/>
    
    <!-- Segments -->
    <ellipse cx="-32" cy="10" rx="25" ry="32" fill="#fbbf24"/>
    <ellipse cx="32" cy="10" rx="25" ry="32" fill="#fbbf24"/>
    
    <!-- Big Eyes -->
    <circle cx="-22" cy="-22" r="15" fill="#ffffff"/>
    <circle cx="22" cy="-22" r="15" fill="#ffffff"/>
    <circle cx="-18" cy="-26" r="10" fill="#1f2937"/>
    <circle cx="26" cy="-26" r="10" fill="#1f2937"/>
    <circle cx="-14" cy="-30" r="5" fill="#ffffff"/>
    <circle cx="30" cy="-30" r="5" fill="#ffffff"/>
    
    <!-- Antenna -->
    <path d="M-22 -38 Q-30 -65 -25 -82" stroke="#f59e0b" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M22 -38 Q30 -65 25 -82" stroke="#f59e0b" stroke-width="6" fill="none" stroke-linecap="round"/>
    <circle cx="-25" cy="-82" r="9" fill="#f59e0b"/>
    <circle cx="25" cy="-82" r="9" fill="#f59e0b"/>
    
    <!-- Big Claws -->
    <ellipse cx="-88" cy="25" rx="38" ry="52" fill="#f43f5e"/>
    <ellipse cx="88" cy="25" rx="38" ry="52" fill="#f43f5e"/>
    
    <!-- Tail -->
    <path d="M0 45 Q-22 68 -35 88 Q0 75 0 98 Q0 75 35 88 Q22 68 0 45" fill="#f43f5e"/>
  </g>
  
  <!-- Ring -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#ffffff" stroke-width="8" opacity="0.6"/>
  
  <!-- Text -->
  <text x="200" y="375" font-family="Arial" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">潮流 · 麻哥</text>
</svg>

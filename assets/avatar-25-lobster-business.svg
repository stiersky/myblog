<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Professional Blue Gradient -->
    <linearGradient id="bizGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow -->
    <filter id="bizShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="180" fill="#eff6ff"/>
  
  <!-- Professional Lobster -->
  <g transform="translate(200, 200)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="65" ry="48" fill="url(#bizGrad)" filter="url(#bizShadow)"/>
    
    <!-- Body Segments -->
    <ellipse cx="-32" cy="8" rx="22" ry="32" fill="#93c5fd"/>
    <ellipse cx="32" cy="8" rx="22" ry="32" fill="#93c5fd"/>
    
    <!-- Professional Eyes -->
    <line x1="-18" y1="-28" x2="-22" y2="-50" stroke="#3b82f6" stroke-width="5" stroke-linecap="round"/>
    <line x1="18" y1="-28" x2="22" y2="-50" stroke="#3b82f6" stroke-width="5" stroke-linecap="round"/>
    <circle cx="-22" cy="-55" r="10" fill="#1e3a5f"/>
    <circle cx="22" cy="-55" r="10" fill="#1e3a5f"/>
    <circle cx="-19" cy="-58" r="4" fill="#ffffff"/>
    <circle cx="25" cy="-58" r="4" fill="#ffffff"/>
    
    <!-- Glasses -->
    <circle cx="-22" cy="-55" r="14" fill="none" stroke="#1e3a5f" stroke-width="2"/>
    <circle cx="22" cy="-55" r="14" fill="none" stroke="#1e3a5f" stroke-width="2"/>
    <line x1="-8" y1="-55" x2="8" y2="-55" stroke="#1e3a5f" stroke-width="2"/>
    
    <!-- Antenna -->
    <path d="M-12 -40 Q-15 -55 -10 -65" stroke="#3b82f6" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M12 -40 Q15 -55 10 -65" stroke="#3b82f6" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Professional Claws (holding briefcase suggestion) -->
    <ellipse cx="-80" cy="10" rx="28" ry="35" fill="#3b82f6" stroke="#60a5fa" stroke-width="3" filter="url(#bizShadow)"/>
    <ellipse cx="80" cy="10" rx="28" ry="35" fill="#3b82f6" stroke="#60a5fa" stroke-width="3" filter="url(#bizShadow)"/>
    
    <!-- Claw Details -->
    <path d="M-68 -20 L-58 -8 M-68 -8 L-58 4 M-68 4 L-58 16" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
    <path d="M68 -20 L58 -8 M68 -8 L58 4 M68 4 L58 16" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Tie Mark -->
    <path d="M0 48 L-8 58 L0 85 L8 58 Z" fill="#1e3a5f"/>
    <path d="M-10 45 L10 45 L8 55 L-8 55 Z" fill="#1e3a5f"/>
    
    <!-- Professional Legs -->
    <path d="M-45 42 Q-62 52 -72 48" stroke="#3b82f6" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M-25 46 Q-42 56 -52 52" stroke="#3b82f6" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M45 42 Q62 52 72 48" stroke="#3b82f6" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M25 46 Q42 56 52 52" stroke="#3b82f6" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <!-- Tail -->
    <path d="M0 48 L-28 75 L0 65 L28 75 Z" fill="#3b82f6" stroke="#60a5fa" stroke-width="2"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="360" font-family="Arial" font-size="28" font-weight="bold" fill="#1e3a5f" text-anchor="middle">🦞 麻哥</text>
</svg>

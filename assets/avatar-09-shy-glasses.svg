<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="softShadow3">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Background Circle - Pure White -->
  <circle cx="200" cy="200" r="180" fill="#ffffff"/>
  
  <!-- Person (Shy with Glasses) -->
  <g transform="translate(200, 210)">
    <!-- Body -->
    <ellipse cx="0" cy="70" rx="60" ry="65" fill="#fef3c7"/>
    
    <!-- Head -->
    <circle cx="0" cy="-15" r="52" fill="#fef3c7"/>
    
    <!-- Hair (Neat, slightly shy) -->
    <path d="M-47 -25 Q-52 -45 -37 -58 Q-17 -65 0 -60 Q17 -65 37 -58 Q52 -45 47 -25 Q42 -35 27 -42 Q0 -48 -27 -42 Q-42 -35 -47 -25" fill="#1f2937"/>
    
    <!-- Glasses -->
    <g stroke="#1f2937" stroke-width="2" fill="none">
      <circle cx="-20" cy="-15" r="16"/>
      <circle cx="20" cy="-15" r="16"/>
      <line x1="-4" y1="-15" x2="4" y2="-15"/>
      <line x1="-36" y1="-12" x2="-45" y2="-18"/>
      <line x1="36" y1="-12" x2="45" y2="-18"/>
    </g>
    
    <!-- Eyes (Behind glasses, looking down slightly) -->
    <circle cx="-20" cy="-15" r="8" fill="#1f2937"/>
    <circle cx="20" cy="-15" r="8" fill="#1f2937"/>
    <circle cx="-18" cy="-17" r="3" fill="#ffffff"/>
    <circle cx="22" cy="-17" r="3" fill="#ffffff"/>
    
    <!-- Blush (Shy) -->
    <ellipse cx="-32" cy="5" rx="11" ry="7" fill="#fca5a5" opacity="0.55"/>
    <ellipse cx="32" cy="5" rx="11" ry="7" fill="#fca5a5" opacity="0.55"/>
    
    <!-- Mouth (Small, nervous smile) -->
    <path d="M-10 20 Q0 24 10 20" stroke="#1f2937" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Hands (Holding laptop/book) -->
    <rect x="-45" y="50" width="90" height="50" rx="5" fill="#1f2937"/>
    <rect x="-35" y="55" width="70" height="40" rx="3" fill="#374151"/>
  </g>
  
  <!-- Lobster (Peeking from behind) -->
  <g transform="translate(200, 210)">
    <ellipse cx="80" cy="20" rx="30" ry="22" fill="#f59e0b"/>
    <circle cx="90" cy="15" r="7" fill="#1f2937"/>
    <circle cx="92" cy="17" r="3" fill="#ffffff"/>
    <path d="M65 25 Q55 20 50 15" stroke="#f59e0b" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M95 25 Q105 20 110 15" stroke="#f59e0b" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Orange Ring -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#f59e0b" stroke-width="6"/>
  
  <!-- Text -->
  <text x="200" y="365" font-family="Arial" font-size="24" font-weight="600" fill="#f59e0b" text-anchor="middle">麻哥</text>
</svg>

<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="minimalShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="180" fill="#ffffff"/>
  
  <!-- Lobster Simple -->
  <g transform="translate(200, 200)">
    <!-- Body -->
    <ellipse cx="0" cy="20" rx="70" ry="50" fill="#f59e0b"/>
    
    <!-- Segments -->
    <ellipse cx="-35" cy="15" rx="25" ry="35" fill="#fbbf24"/>
    <ellipse cx="0" cy="10" rx="25" ry="35" fill="#f59e0b"/>
    <ellipse cx="35" cy="15" rx="25" ry="35" fill="#fbbf24"/>
    
    <!-- Claws -->
    <ellipse cx="-85" cy="20" rx="30" ry="40" fill="#ef4444"/>
    <ellipse cx="85" cy="20" rx="30" ry="40" fill="#ef4444"/>
    
    <!-- Eyes -->
    <circle cx="-25" cy="-25" r="12" fill="#1f2937"/>
    <circle cx="25" cy="-25" r="12" fill="#1f2937"/>
    <circle cx="-22" cy="-28" r="5" fill="#ffffff"/>
    <circle cx="28" cy="-28" r="5" fill="#ffffff"/>
    
    <!-- Antenna -->
    <path d="M-25 -35 Q-35 -55 -40 -65" stroke="#f59e0b" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M25 -35 Q35 -55 40 -65" stroke="#f59e0b" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="-40" cy="-65" r="6" fill="#f59e0b"/>
    <circle cx="40" cy="-65" r="6" fill="#f59e0b"/>
  </g>
  
  <!-- Ring -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#f59e0b" stroke-width="8"/>
  
  <!-- Text -->
  <text x="200" y="365" font-family="Arial" font-size="28" font-weight="bold" fill="#f59e0b" text-anchor="middle">麻哥</text>
</svg>

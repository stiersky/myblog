<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="180" fill="url(#grad1)"/>
  
  <!-- Robot Head -->
  <g transform="translate(200, 200)">
    <!-- Head Base -->
    <rect x="-60" y="-50" width="120" height="100" rx="15" fill="#ffffff" filter="url(#shadow)"/>
    
    <!-- Eyes -->
    <circle cx="-25" cy="-10" r="15" fill="#1e3a5f"/>
    <circle cx="25" cy="-10" r="15" fill="#1e3a5f"/>
    <circle cx="-22" cy="-12" r="6" fill="#ffffff"/>
    <circle cx="28" cy="-12" r="6" fill="#ffffff"/>
    
    <!-- Antenna -->
    <line x1="0" y1="-50" x2="0" y2="-75" stroke="#f59e0b" stroke-width="4"/>
    <circle cx="0" cy="-80" r="10" fill="#ef4444"/>
    
    <!-- Mouth -->
    <rect x="-20" y="20" width="40" height="8" rx="4" fill="#1e3a5f"/>
    
    <!-- Lobster Claws -->
    <ellipse cx="-85" cy="10" rx="25" ry="35" fill="#f59e0b" stroke="#ffffff" stroke-width="3"/>
    <ellipse cx="85" cy="10" rx="25" ry="35" fill="#f59e0b" stroke="#ffffff" stroke-width="3"/>
    
    <!-- Lobster Body behind -->
    <ellipse cx="0" cy="80" rx="70" ry="50" fill="#ef4444" opacity="0.8"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="350" font-family="Arial" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">麻哥</text>
</svg>

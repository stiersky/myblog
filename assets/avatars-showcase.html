<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麻哥头像设计稿 - 领袖版</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 {
            text-align: center;
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.95);
            margin-bottom: 40px;
            font-size: 1.2rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        .card:hover { transform: translateY(-10px); }
        .avatar-preview {
            width: 280px;
            height: 280px;
            margin: 0 auto 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
            background: #ffffff;
            overflow: hidden;
            border: 6px solid #f59e0b;
        }
        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card h3 {
            font-size: 1.6rem;
            margin-bottom: 15px;
            color: #1f2937;
        }
        .card p {
            color: #6b7280;
            font-size: 1.05rem;
            margin-bottom: 20px;
            line-height: 1.7;
        }
        .tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        .tag {
            display: inline-block;
            padding: 7px 18px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .tag-king { background: linear-gradient(135deg, #fcd34d, #f59e0b); color: #78350f; }
        .tag-pro { background: linear-gradient(135deg, #d1fae5, #a7f3d0); color: #065f46; }
        .tag-tech { background: linear-gradient(135deg, #dbeafe, #bfdbfe); color: #1e40af; }
        
        .cta {
            text-align: center;
            margin-top: 50px;
            padding: 40px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .cta h2 {
            font-size: 1.9rem;
            margin-bottom: 15px;
        }
        .cta p {
            font-size: 1.15rem;
            opacity: 0.95;
        }
        
        .featured {
            border: 4px solid #f59e0b;
            position: relative;
        }
        .featured::before {
            content: '👑 推荐';
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            padding: 8px 25px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👑 麻哥头像设计稿</h1>
        <p class="subtitle">金橙色系 × 皇冠 × 头顶龙虾 × 手持电脑</p>
        
        <div class="grid">
            <!-- Design 10 - Featured -->
            <div class="card featured">
                <div class="avatar-preview">
                    <img src="avatar-10-king-lobster.svg" alt="领袖麻哥">
                </div>
                <h3>👑 领袖麻哥</h3>
                <p>金橙色渐变背景 + 皇冠 + 头顶龙虾 + 手持电脑，高端大气领袖气质</p>
                <div class="tags">
                    <span class="tag tag-king">👑 领袖</span>
                    <span class="tag tag-pro">💼 高端</span>
                    <span class="tag tag-tech">💻 科技</span>
                </div>
            </div>
        </div>
        
        <div class="cta">
            <h2>🎨 设计元素</h2>
            <p><strong>金橙色系</strong> — 温暖、高端、活力</p>
            <p><strong>皇冠</strong> — 领袖气质、权威感</p>
            <p><strong>头顶龙虾</strong> — 个人特色、龙虾元素</p>
            <p><strong>手持电脑</strong> — 科技感、专业性</p>
            <p style="margin-top: 20px; opacity: 0.9; font-size: 1.05rem;">
                📁 SVG 文件已保存在 <code>assets/avatar-10-king-lobster.svg</code><br>
                🎨 可直接用于博客、社交媒体、文档等
            </p>
        </div>
        
        <div style="text-align: center; margin-top: 40px; color: rgba(255,255,255,0.85);">
            <p>🦞 Designed by 大总管 for 麻哥</p>
        </div>
    </div>
</body>
</html>

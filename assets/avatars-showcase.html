<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麻哥头像设计稿 - 极简人物版</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 {
            text-align: center;
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.95);
            margin-bottom: 40px;
            font-size: 1.2rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 35px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 35px;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
            transition: transform 0.3s;
        }
        .card:hover { transform: translateY(-10px); }
        .avatar-preview {
            width: 240px;
            height: 240px;
            margin: 0 auto 25px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.12);
            background: #ffffff;
            overflow: hidden;
            border: 4px solid #f59e0b;
        }
        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card h3 {
            font-size: 1.5rem;
            margin-bottom: 12px;
            color: #1f2937;
        }
        .card p {
            color: #6b7280;
            font-size: 1rem;
            margin-bottom: 18px;
            line-height: 1.6;
        }
        .tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }
        .tag {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .tag-shy { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; }
        .tag-minimal { background: linear-gradient(135deg, #f3f4f6, #e5e7eb); color: #374151; }
        .tag-cute { background: linear-gradient(135deg, #fce7f3, #fbcfe8); color: #9d174d; }
        .tag-pro { background: linear-gradient(135deg, #d1fae5, #a7f3d0); color: #065f46; }
        
        .cta {
            text-align: center;
            margin-top: 50px;
            padding: 35px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .cta h2 {
            font-size: 1.8rem;
            margin-bottom: 15px;
        }
        .cta p {
            font-size: 1.1rem;
            opacity: 0.95;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦞 麻哥头像设计稿</h1>
        <p class="subtitle">腼腆人物形象 × 极简色调 × 龙虾小伙伴</p>
        
        <div class="grid">
            <!-- Design 7 -->
            <div class="card">
                <div class="avatar-preview">
                    <img src="avatar-07-shy-person.svg" alt="腼腆麻哥">
                </div>
                <h3>😊 腼腆麻哥</h3>
                <p>纯白背景 + 腼腆人物，肩上有小龙虾，温和亲切</p>
                <div class="tags">
                    <span class="tag tag-shy">😊 腼腆</span>
                    <span class="tag tag-minimal">✨ 极简</span>
                    <span class="tag tag-cute">亲切</span>
                </div>
            </div>
            
            <!-- Design 8 -->
            <div class="card">
                <div class="avatar-preview">
                    <img src="avatar-08-shy-casual.svg" alt="休闲麻哥">
                </div>
                <h3>👕 休闲麻哥</h3>
                <p>连帽衫休闲风，手捧小龙虾，轻松随性</p>
                <div class="tags">
                    <span class="tag tag-shy">😊 腼腆</span>
                    <span class="tag tag-minimal">👕 休闲</span>
                    <span class="tag tag-cute">可爱</span>
                </div>
            </div>
            
            <!-- Design 9 -->
            <div class="card">
                <div class="avatar-preview">
                    <img src="avatar-09-shy-glasses.svg" alt="眼镜麻哥">
                </div>
                <h3>👓 眼镜麻哥</h3>
                <p>戴眼镜的知识分子形象，龙虾从身后探头</p>
                <div class="tags">
                    <span class="tag tag-shy">😊 腼腆</span>
                    <span class="tag tag-pro">📚 专业</span>
                    <span class="tag tag-minimal">极简</span>
                </div>
            </div>
        </div>
        
        <div class="cta">
            <h2>💡 设计理念</h2>
            <p>极简白色背景 + 暖橙色调，腼腆人物形象 + 龙虾小伙伴</p>
            <p style="margin-top: 15px; opacity: 0.9; font-size: 1rem;">
                📁 所有 SVG 文件已保存在 <code>assets/</code> 目录<br>
                🎨 可以直接用于博客、社交媒体、文档等
            </p>
        </div>
        
        <div style="text-align: center; margin-top: 40px; color: rgba(255,255,255,0.85);">
            <p>🦞 Designed by 大总管 for 麻哥</p>
        </div>
    </div>
</body>
</html>

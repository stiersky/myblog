<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pixelBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bae6fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7dd3fc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="200" cy="200" r="180" fill="url(#pixelBlue)"/>
  
  <!-- Pixel Art Person (simplified pixel style with rectangles) -->
  <g transform="translate(200, 220)">
    <!-- Body -->
    <rect x="-55" y="20" width="110" height="110" rx="10" fill="#fbbf24"/>
    
    <!-- Head -->
    <rect x="-50" y="-70" width="100" height="90" rx="10" fill="#fbbf24"/>
    
    <!-- Hair -->
    <rect x="-48" y="-68" width="96" height="25" rx="5" fill="#1f2937"/>
    
    <!-- Eyes (pixel style) -->
    <rect x="-35" y="-35" width="25" height="25" fill="#1f2937"/>
    <rect x="10" y="-35" width="25" height="25" fill="#1f2937"/>
    <rect x="-28" y="-30" width="10" height="10" fill="#ffffff"/>
    <rect x="17" y="-30" width="10" height="10" fill="#ffffff"/>
    
    <!-- Glasses -->
    <rect x="-38" y="-38" width="32" height="32" rx="3" fill="none" stroke="#1f2937" stroke-width="3"/>
    <rect x="7" y="-38" width="32" height="32" rx="3" fill="none" stroke="#1f2937" stroke-width="3"/>
    <rect x="-6" y="-25" width="12" height="5" fill="#1f2937"/>
    
    <!-- Blush -->
    <rect x="-50" y="-10" width="20" height="12" rx="3" fill="#fca5a5" opacity="0.5"/>
    <rect x="30" y="-10" width="20" height="12" rx="3" fill="#fca5a5" opacity="0.5"/>
    
    <!-- Mouth -->
    <rect x="-20" y="5" width="40" height="8" rx="3" fill="#1f2937"/>
    
    <!-- Hands -->
    <rect x="-75" y="50" width="35" height="40" rx="8" fill="#fbbf24"/>
    <rect x="40" y="50" width="35" height="40" rx="8" fill="#fbbf24"/>
  </g>
  
  <!-- Pixel Laptop -->
  <g transform="translate(200, 310)">
    <rect x="-50" y="-30" width="100" height="55" rx="5" fill="#1f2937"/>
    <rect x="-44" y="-24" width="88" height="45" rx="3" fill="#374151"/>
    <rect x="-38" y="-17" width="35" height="6" fill="#38bdf8"/>
    <rect x="-38" y="-6" width="45" height="6" fill="#38bdf8"/>
    <rect x="-38" y="5" width="30" height="6" fill="#38bdf8"/>
    <rect x="-55" y="25" width="110" height="12" rx="3" fill="#374151"/>
  </g>
  
  <!-- Pixel Lobster Hat -->
  <g transform="translate(200, 135)">
    <!-- Hat Base -->
    <rect x="-65" y="35" width="130" height="20" rx="5" fill="#f59e0b"/>
    
    <!-- Lobster Body -->
    <rect x="-55" y="-35" width="110" height="70" rx="10" fill="#f59e0b"/>
    
    <!-- Segments -->
    <rect x="-50" y="-25" width="40" height="50" rx="8" fill="#fbbf24"/>
    <rect x="10" y="-25" width="40" height="50" rx="8" fill="#fbbf24"/>
    
    <!-- Eyes -->
    <rect x="-40" y="-25" width="22" height="22" fill="#1f2937"/>
    <rect x="18" y="-25" width="22" height="22" fill="#1f2937"/>
    <rect x="-35" y="-22" width="10" height="10" fill="#ffffff"/>
    <rect x="23" y="-22" width="10" height="10" fill="#ffffff"/>
    
    <!-- Antenna -->
    <rect x="-38" y="-45" width="8" height="25" fill="#f59e0b"/>
    <rect x="30" y="-45" width="8" height="25" fill="#f59e0b"/>
    <circle cx="-34" cy="-50" r="8" fill="#f59e0b"/>
    <circle cx="34" cy="-50" r="8" fill="#f59e0b"/>
    
    <!-- Claws -->
    <rect x="-95" y="-10" width="45" height="65" rx="10" fill="#ef4444"/>
    <rect x="50" y="-10" width="45" height="65" rx="10" fill="#ef4444"/>
    
    <!-- Tail -->
    <rect x="-15" y="35" width="30" height="40" rx="5" fill="#ef4444"/>
  </g>
  
  <!-- Ring -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#0369a1" stroke-width="8"/>
  
  <!-- Text -->
  <text x="200" y="375" font-family="Arial" font-size="26" font-weight="bold" fill="#0369a1" text-anchor="middle">像素 · 麻哥</text>
</svg>

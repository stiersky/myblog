<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="180" fill="url(#grad3)"/>
  
  <!-- Grid Pattern -->
  <g stroke="rgba(255,255,255,0.1)" stroke-width="1">
    <line x1="50" y1="100" x2="350" y2="100"/>
    <line x1="50" y1="150" x2="350" y2="150"/>
    <line x1="50" y1="200" x2="350" y2="200"/>
    <line x1="50" y1="250" x2="350" y2="250"/>
    <line x1="50" y1="300" x2="350" y2="300"/>
    <line x1="100" y1="50" x2="100" y2="350"/>
    <line x1="150" y1="50" x2="150" y2="350"/>
    <line x1="200" y1="50" x2="200" y2="350"/>
    <line x1="250" y1="50" x2="250" y2="350"/>
    <line x1="300" y1="50" x2="300" y2="350"/>
  </g>
  
  <!-- Robot Head -->
  <g transform="translate(200, 200)">
    <!-- Head -->
    <rect x="-65" y="-55" width="130" height="110" rx="12" fill="#1f2937"/>
    
    <!-- Neon Eyes -->
    <ellipse cx="-28" cy="-15" rx="18" ry="14" fill="#000000"/>
    <ellipse cx="28" cy="-15" rx="18" ry="14" fill="#000000"/>
    <circle cx="-25" cy="-15" r="8" fill="#06b6d4" filter="url(#neon)"/>
    <circle cx="28" cy="-15" r="8" fill="#06b6d4" filter="url(#neon)"/>
    
    <!-- Cyber Mouth -->
    <rect x="-30" y="25" width="60" height="6" rx="3" fill="#06b6d4" filter="url(#neon)"/>
    
    <!-- Antenna -->
    <line x1="0" y1="-55" x2="0" y2="-85" stroke="#06b6d4" stroke-width="3" filter="url(#neon)"/>
    <circle cx="0" cy="-90" r="10" fill="#06b6d4" filter="url(#neon)"/>
  </g>
  
  <!-- Lobster Body -->
  <g transform="translate(200, 280)">
    <ellipse cx="0" cy="0" rx="80" ry="50" fill="#f59e0b" opacity="0.9"/>
    <!-- Segments -->
    <path d="M-60 0 Q-40 -20 -20 0" stroke="#ffffff" stroke-width="3" fill="none"/>
    <path d="M-20 0 Q0 -20 20 0" stroke="#ffffff" stroke-width="3" fill="none"/>
    <path d="M20 0 Q40 -20 60 0" stroke="#ffffff" stroke-width="3" fill="none"/>
  </g>
  
  <!-- Lobster Claws -->
  <g transform="translate(200, 270)">
    <ellipse cx="-90" cy="0" rx="30" ry="40" fill="#f59e0b" stroke="#06b6d4" stroke-width="2"/>
    <ellipse cx="90" cy="0" rx="30" ry="40" fill="#f59e0b" stroke="#06b6d4" stroke-width="2"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="365" font-family="Arial" font-size="22" font-weight="bold" fill="#06b6d4" text-anchor="middle" filter="url(#neon)">CYBER 麻哥</text>
</svg>

<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2744;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="180" fill="url(#grad2)"/>
  
  <!-- Circuit Pattern -->
  <g stroke="rgba(99, 102, 241, 0.3)" stroke-width="2" fill="none">
    <path d="M50 100 L100 100 L120 120"/>
    <path d="M350 100 L300 100 L280 120"/>
    <path d="M50 300 L100 300 L120 280"/>
    <path d="M350 300 L300 300 L280 280"/>
    <circle cx="100" cy="100" r="4" fill="#6366f1"/>
    <circle cx="300" cy="100" r="4" fill="#6366f1"/>
    <circle cx="100" cy="300" r="4" fill="#6366f1"/>
    <circle cx="300" cy="300" r="4" fill="#6366f1"/>
  </g>
  
  <!-- Robot Head -->
  <g transform="translate(200, 190)">
    <rect x="-70" y="-60" width="140" height="120" rx="20" fill="#ffffff" filter="url(#shadow)"/>
    
    <!-- Visor -->
    <rect x="-55" y="-40" width="110" height="50" rx="8" fill="#1e3a5f"/>
    <rect x="-45" y="-30" width="40" height="30" rx="5" fill="#6366f1" opacity="0.8" filter="url(#glow)"/>
    <rect x="5" y="-30" width="40" height="30" rx="5" fill="#6366f1" opacity="0.8" filter="url(#glow)"/>
    
    <!-- Antenna -->
    <line x1="-30" y1="-60" x2="-30" y2="-85" stroke="#6366f1" stroke-width="4"/>
    <circle cx="-30" cy="-90" r="8" fill="#6366f1" filter="url(#glow)"/>
    <line x1="30" y1="-60" x2="30" y2="-85" stroke="#6366f1" stroke-width="4"/>
    <circle cx="30" cy="-90" r="8" fill="#6366f1" filter="url(#glow)"/>
  </g>
  
  <!-- Lobster Claws -->
  <g transform="translate(200, 220)">
    <path d="M-80 20 Q-100 0 -90 -20 Q-80 -10 -70 10" fill="#f59e0b" stroke="#ffffff" stroke-width="2"/>
    <path d="M80 20 Q100 0 90 -20 Q80 -10 70 10" fill="#f59e0b" stroke="#ffffff" stroke-width="2"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="360" font-family="Arial" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">麻哥 AI</text>
</svg>

<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:1" />
    </linearGradient>
    <filter id="softShadow2">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background Circle - Light Blue -->
  <circle cx="200" cy="200" r="180" fill="url(#blueGrad)"/>
  
  <!-- Person (Glasses/Shy) -->
  <g transform="translate(200, 220)">
    <!-- Body -->
    <ellipse cx="0" cy="70" rx="60" ry="65" fill="#fef3c7"/>
    <!-- Head -->
    <circle cx="0" cy="-15" r="52" fill="#fef3c7"/>
    <!-- Hair -->
    <path d="M-47 -25 Q-52 -45 -37 -58 Q-17 -65 0 -60 Q17 -65 37 -58 Q52 -45 47 -25 Q42 -35 27 -42 Q0 -48 -27 -42 Q-42 -35 -47 -25" fill="#1f2937"/>
    <!-- Glasses -->
    <g stroke="#1f2937" stroke-width="2.5" fill="none">
      <circle cx="-20" cy="-15" r="18"/>
      <circle cx="20" cy="-15" r="18"/>
      <line x1="-2" y1="-15" x2="2" y2="-15"/>
    </g>
    <!-- Eyes -->
    <circle cx="-20" cy="-15" r="9" fill="#1f2937"/>
    <circle cx="20" cy="-15" r="9" fill="#1f2937"/>
    <circle cx="-17" cy="-18" r="4" fill="#ffffff"/>
    <circle cx="23" cy="-18" r="4" fill="#ffffff"/>
    <!-- Blush -->
    <ellipse cx="-32" cy="5" rx="11" ry="7" fill="#fca5a5" opacity="0.55"/>
    <ellipse cx="32" cy="5" rx="11" ry="7" fill="#fca5a5" opacity="0.55"/>
    <!-- Mouth -->
    <path d="M-10 20 Q0 25 10 20" stroke="#1f2937" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Hands -->
    <ellipse cx="-48" cy="65" rx="20" ry="25" fill="#fef3c7"/>
    <ellipse cx="48" cy="65" rx="20" ry="25" fill="#fef3c7"/>
  </g>
  
  <!-- Laptop -->
  <g transform="translate(200, 300)">
    <rect x="-45" y="-30" width="90" height="50" rx="4" fill="#1f2937" filter="url(#softShadow2)"/>
    <rect x="-40" y="-25" width="80" height="40" rx="2" fill="#374151"/>
    <g fill="#ffffff" opacity="0.5">
      <rect x="-32" y="-18" width="45" height="3" rx="1"/>
      <rect x="-32" y="-10" width="55" height="3" rx="1"/>
      <rect x="-32" y="-2" width="40" height="3" rx="1"/>
    </g>
    <path d="M-50 20 L50 20 L55 28 L-55 28 Z" fill="#374151"/>
  </g>
  
  <!-- BIG Lobster on Head -->
  <g transform="translate(200, 130)">
    <ellipse cx="0" cy="0" rx="55" ry="40" fill="#f59e0b" filter="url(#softShadow2)"/>
    <ellipse cx="-28" cy="8" rx="22" ry="30" fill="#fbbf24"/>
    <ellipse cx="28" cy="8" rx="22" ry="30" fill="#fbbf24"/>
    <circle cx="-18" cy="-20" r="10" fill="#1f2937"/>
    <circle cx="18" cy="-20" r="10" fill="#1f2937"/>
    <circle cx="-15" cy="-23" r="5" fill="#ffffff"/>
    <circle cx="21" cy="-23" r="5" fill="#ffffff"/>
    <path d="M-18 -30 Q-25 -55 -20 -70" stroke="#f59e0b" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M18 -30 Q25 -55 20 -70" stroke="#f59e0b" stroke-width="5" fill="none" stroke-linecap="round"/>
    <circle cx="-20" cy="-70" r="7" fill="#f59e0b"/>
    <circle cx="20" cy="-70" r="7" fill="#f59e0b"/>
    <ellipse cx="-70" cy="10" rx="30" ry="42" fill="#ef4444" stroke="#f59e0b" stroke-width="3"/>
    <ellipse cx="70" cy="10" rx="30" ry="42" fill="#ef4444" stroke="#f59e0b" stroke-width="3"/>
    <path d="M0 40 Q-15 60 -25 75 Q0 70 0 85 Q0 70 25 75 Q15 60 0 40" fill="#ef4444"/>
  </g>
  
  <!-- Blue Ring -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#1e40af" stroke-width="8"/>
  
  <!-- Text -->
  <text x="200" y="370" font-family="Arial" font-size="26" font-weight="bold" fill="#1e40af" text-anchor="middle">👓 麻哥</text>
</svg>
